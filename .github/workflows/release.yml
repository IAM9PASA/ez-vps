name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  BINARY_NAME: ez-vps

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: ez-vps-x86_64-unknown-linux-gnu.tar.gz
            use_cross: false
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset_name: ez-vps-aarch64-unknown-linux-gnu.tar.gz
            use_cross: true
          - runner: macos-13
            target: x86_64-apple-darwin
            asset_name: ez-vps-x86_64-apple-darwin.tar.gz
            use_cross: false
          - runner: macos-14
            target: aarch64-apple-darwin
            asset_name: ez-vps-aarch64-apple-darwin.tar.gz
            use_cross: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build release binary
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target "${{ matrix.target }}"
          else
            cargo build --release --target "${{ matrix.target }}"
          fi

      - name: Package archive
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}" "dist/${BINARY_NAME}"
          tar -czf "${{ matrix.asset_name }}" -C dist "${BINARY_NAME}"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}

